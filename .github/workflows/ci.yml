name: CI - MLflow Project with Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train-and-docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn mlflow
      
      - name: Run training script
        run: |
          python MLProject/modelling.py
      
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/best_model.pkl
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mok111
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        run: |
          docker build -t mok111/titanic-mlflow:latest -f MLProject/Dockerfile MLProject/
      
      - name: Push Docker image to Docker Hub
        run: |
          docker push mok111/titanic-mlflow:latest
      
      - name: Run MLflow tracking (local)
        run: |
          mlflow ui --host 0.0.0.0 --port 5000 &